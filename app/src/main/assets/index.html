<!DOCTYPE html>
<html dir='rtl' lang='ar'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'>
<title>ESP32-SaQr</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding-bottom:60px}
.header{background:#161b22;padding:10px 14px;border-bottom:1px solid #30363d}
.header h1{font-size:16px;color:#58a6ff;display:inline}
#status-badge{float:left;padding:3px 10px;border-radius:10px;font-size:11px;background:#da3633;color:#fff}
#connect-bar{background:#1f6feb;color:#fff;text-align:center;padding:12px;font-weight:700;font-size:14px;cursor:pointer}
#connect-bar.connected{background:#238636}
.tabs{border-bottom:1px solid #30363d;overflow:hidden;background:#161b22}
.tab{float:right;width:20%;padding:10px;background:none;border:none;color:#8b949e;font-size:14px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;outline:none}
.tab.active{color:#58a6ff;border-bottom:2px solid #58a6ff;font-weight:600}
.tab-content{display:none;padding:10px}
.tab-content.active{display:block}
.section{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:6px 10px 10px;margin:8px 0}
.section-title{font-size:12px;font-weight:600;color:#8b949e;padding:6px 0 4px}
.btns{overflow:hidden}
.btns button{width:48%;padding:12px 4px;margin:2px 1%;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btns button:active{background:#30363d}
.evp-form{padding:4px 0}
.evp-form input,.evp-form select{padding:8px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:13px;width:100%;margin-bottom:4px}
.evp-form button{width:100%;padding:8px;background:#1f6feb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600}
.evp-form button.green{background:#238636}
.evp-form button.red{background:#da3633}
.stop-btn{background:#da3633;color:#fff;text-align:center;padding:16px;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;margin:8px 0}
#log{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;margin:8px 0;font-size:11px;font-family:monospace;color:#8b949e;height:120px;overflow-y:auto;direction:ltr;text-align:left}
</style>
</head>
<body>

<div class='header'>
  <h1>ESP32-SaQr</h1>
  <span id='status-badge'>غير متصل</span>
</div>
<div id='connect-bar' onclick='doConnect()'>🔌 ربط USB</div>

<div class='tabs'>
<button class='tab active' data-tab='wifi' onclick='showTab(this)'>WiFi</button>
<button class='tab' data-tab='ir' onclick='showTab(this)'>IR</button>
<button class='tab' data-tab='rf' onclick='showTab(this)'>RF</button>
<button class='tab' data-tab='rgb' onclick='showTab(this)'>RGB</button>
<button class='tab' data-tab='device' onclick='showTab(this)'>جهاز</button>
</div>

<div id='tab-wifi' class='tab-content active'>
<div class='section'><div class='section-title'>مسح</div><div class='btns'>
<button onclick='send("scanall")'>مسح الكل</button>
<button onclick='send("sniffbeacon")'>منارات</button>
<button onclick='send("sniffprobe")'>بروب</button>
<button onclick='send("stopscan")'>إيقاف</button>
</div></div>
</div>

<div id='tab-ir' class='tab-content'>
<div class='section'><div class='section-title'>إرسال IR</div>
<div class='evp-form'>
<input type='text' id='ir-hex' placeholder='Hex (مثال FF38C7)' dir='ltr'>
<button class='green' onclick='sendIR()'>إرسال</button>
</div></div>
</div>

<div id='tab-rf' class='tab-content'>
<div class='section'><div class='section-title'>RF 433MHz</div>
<div class='btns'>
<button id='rf-btn' onclick='toggleRF()'>🔍 بدء تعلم</button>
<button onclick='send("rf -clear")'>مسح</button>
</div>
<div class='evp-form' style='margin-top:6px'>
<input type='text' id='bf-s' placeholder='بداية' value='0' dir='ltr'>
<input type='text' id='bf-e' placeholder='نهاية' value='1000' dir='ltr'>
<input type='text' id='bf-b' placeholder='بت' value='24' dir='ltr'>
<button class='red' onclick='send("rf -b "+v("bf-s")+" "+v("bf-e")+" "+v("bf-b"))'>هجوم</button>
</div>
<div id='rf-codes'></div></div>
</div>

<div id='tab-rgb' class='tab-content'>
<div class='section'><div class='section-title'>RGB LED</div>
<div class='btns'>
<button onclick='send("rgb -m 0")'>إطفاء</button>
<button onclick='send("rgb -m 1")'>أحمر</button>
<button onclick='send("rgb -m 2")'>أخضر</button>
<button onclick='send("rgb -m 3")'>أزرق</button>
<button onclick='send("rgb -m 4")'>أصفر</button>
<button onclick='send("rgb -m 7")'>أبيض</button>
<button onclick='send("rgb -m 11")'>قوس قزح</button>
<button onclick='send("rgb -m 12")'>شرطي</button>
</div></div>
</div>

<div id='tab-device' class='tab-content'>
<div class='stop-btn' onclick='send("reboot")'>🔁 إعادة تشغيل</div>
<div class='section'><div class='section-title'>أوامر</div>
<div class='btns'>
<button onclick='send("rf -l")'>عرض كودات RF</button>
<button onclick='send("clearlist -a")'>مسح AP</button>
<button onclick='send("help")'>مساعدة</button>
</div></div>
</div>

<div id='log'></div>

<script>
var connected=false;

function v(id){return document.getElementById(id).value}

function log(t){
  var el=document.getElementById('log');
  el.innerHTML+=t+'<br>';
  el.scrollTop=el.scrollHeight;
}

function showTab(btn){
  var tabName=btn.getAttribute('data-tab');
  var ts=document.getElementsByClassName('tab');
  for(var i=0;i<ts.length;i++)ts[i].className='tab';
  btn.className='tab active';
  var cs=document.getElementsByClassName('tab-content');
  for(var i=0;i<cs.length;i++)cs[i].className='tab-content';
  document.getElementById('tab-'+tabName).className='tab-content active';
}

function doConnect(){
  if(connected){
    AndroidSerial.disconnect();
    return;
  }
  AndroidSerial.connect();
}

function send(cmd){
  if(!connected){log('⚠️ اربط USB أولاً');return}
  AndroidSerial.send(cmd);
  log('→ '+cmd);
}

function sendIR(){
  var code=document.getElementById('ir-hex').value;
  code=code.replace(/^\s+|\s+$/g,'');
  if(code=='')return;
  if(code.toUpperCase().indexOf('0X')===0)code=code.substring(2);
  send('HEX:'+code);
}

var rfLearning=false;
function toggleRF(){
  if(rfLearning){
    send('rf -z');
    document.getElementById('rf-btn').textContent='🔍 بدء تعلم';
    rfLearning=false;
  } else {
    send('rf -c');
    document.getElementById('rf-btn').textContent='🛑 جاري...';
    rfLearning=true;
    setTimeout(function(){
      send('rf -z');
      send('rf -l');
      document.getElementById('rf-btn').textContent='🔍 بدء تعلم';
      rfLearning=false;
    },8000);
  }
}

// ---- Android bridge callbacks ----
var AndroidUSB={
  onStatus:function(s){
    var bar=document.getElementById('connect-bar');
    var badge=document.getElementById('status-badge');
    if(s==='connected'){
      bar.textContent='✅ متصل';
      bar.className='connected';
      badge.textContent='متصل';
      badge.style.background='#238636';
      connected=true;
      log('✅ متصل بالـ ESP32');
    } else if(s==='no_device'){
      log('❌ لم يتم العثور على قطعة USB');
    } else if(s==='need_permission'){
      log('🔑 يطلب الإذن...');
    } else if(s==='disconnected'){
      bar.textContent='🔌 ربط USB';
      bar.className='';
      badge.textContent='غير متصل';
      badge.style.background='#da3633';
      connected=false;
      log('🔌 قطع الاتصال');
    } else if(s.indexOf('error:')===0){
      log('❌ '+s);
    }
  },
  onData:function(d){
    log('← '+d);
    if(d.indexOf('codes stored')>-1){
    } else if(d.match(/\[(\d+)\]/)){
    }
  },
  onPermission:function(g){
    if(g){
      log('✅ إذن USB تم');
      AndroidSerial.connect();
    } else {
      log('❌ رفض الإذن');
    }
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html dir='rtl' lang='ar'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'>
<title>ESP32-SaQr OTG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding-bottom:60px}
.header{background:#161b22;padding:10px 14px;overflow:hidden;border-bottom:1px solid #30363d}
.header h1{float:right;margin:0;font-size:16px;color:#58a6ff}
#status-badge{float:left;padding:3px 10px;border-radius:10px;font-size:11px;background:#da3633;color:#fff}
.tabs{overflow:hidden;background:#161b22;border-bottom:1px solid #30363d}
.tab{float:right;width:25%;padding:8px;background:none;border:none;color:#8b949e;font-size:13px;cursor:pointer;font-family:inherit}
.tab.active{color:#58a6ff;border-bottom:2px solid #58a6ff;font-weight:600}
.tab-content{display:none;padding:10px}
.tab-content.active{display:block}
.section{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:6px 10px 10px;margin:8px 0}
.section-title{font-size:12px;font-weight:600;color:#8b949e;padding:6px 0 4px}
.btns{overflow:hidden}
.btns button{float:right;width:48%;margin:1%;padding:9px 4px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:12px;cursor:pointer;font-family:inherit}
.btns button:active{background:#30363d}
.evp-form{padding:4px 0}
.evp-form input,.evp-form select{display:block;width:100%;padding:8px;border:1px solid #30363d;border-radius:6px;margin:3px 0;font-size:13px;background:#0d1117;color:#c9d1d9}
.evp-form button{display:block;width:100%;padding:8px;margin:3px 0;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}
.btn-blue{background:#1f6feb;color:#fff}
.btn-green{background:#238636;color:#fff}
.btn-red{background:#da3633;color:#fff}
.otg-btn{background:#1f6feb;color:#fff;text-align:center;padding:16px;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;margin:8px 0;border:none;width:100%}
.otg-btn.connected{background:#238636}
.stop-btn{background:#da3633;color:#fff;text-align:center;padding:16px;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;margin:8px 0;border:none;width:100%}
#log-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;margin-top:8px;font-size:11px;font-family:monospace;color:#8b949e;height:120px;overflow-y:auto;direction:ltr;text-align:left}
</style>
</head>
<body>

<div class='header'>
  <h1>ESP32-SaQr OTG</h1>
  <span id='status-badge'>غير متصل</span>
</div>

<div class='tabs'>
<button class='tab active' data-tab='wifi' onclick='showTab(this)'>WiFi</button>
<button class='tab' data-tab='ir' onclick='showTab(this)'>IR</button>
<button class='tab' data-tab='rf' onclick='showTab(this)'>RF</button>
<button class='tab' data-tab='device' onclick='showTab(this)'>جهاز</button>
</div>

<div id='tab-wifi' class='tab-content active'>
<div class='section'><div class='section-title'>مسح الشبكات</div><div class='btns'>
<button onclick='send("scanall")'>مسح الكل</button>
<button onclick='send("sniffbeacon")'>منارات</button>
<button onclick='send("sniffprobe")'>بروب</button>
<button onclick='send("stopscan")'>إيقاف</button>
</div></div>
</div>

<div id='tab-ir' class='tab-content'>
<div class='section'><div class='section-title'>إرسال IR</div>
<div class='evp-form'>
<input type='text' id='ir-code' placeholder='Hex (مثال FF00FF)' dir='ltr'>
<button class='btn-green' onclick='sendIR()'>إرسال</button>
</div></div>
</div>

<div id='tab-rf' class='tab-content'>
<div class='section'><div class='section-title'>RF 433MHz</div>
<div class='btns'>
<button id='rf-cap-btn' onclick='toggleRF()'>بدء تعلم</button>
<button class='btn-red' onclick='send("rf -clear")'>مسح الكل</button>
</div>
<div class='evp-form' style='margin-top:6px'>
<input type='text' id='bf-s' placeholder='بداية' value='0' dir='ltr'>
<input type='text' id='bf-e' placeholder='نهاية' value='1000' dir='ltr'>
<input type='text' id='bf-b' placeholder='بت' value='24' dir='ltr'>
<button class='btn-red' onclick='send("rf -b "+v("bf-s")+" "+v("bf-e")+" "+v("bf-b"))'>هجوم</button>
</div>
<div id='rf-codes' style='margin-top:6px;font-size:12px'></div></div>
</div>

<div id='tab-device' class='tab-content'>
<button id='otg-btn' class='otg-btn' onclick='doConnect()'>🔌 اتصال OTG</button>
<div class='section'><div class='section-title'>RGB LED</div>
<div class='evp-form'>
<select id='rgb-mode'>
<option value='0'>إطفاء</option><option value='1'>أحمر</option>
<option value='2'>أخضر</option><option value='3'>أزرق</option>
<option value='4'>أصفر</option><option value='5'>سماوي</option>
<option value='6'>أرجواني</option><option value='7'>أبيض</option>
<option value='11'>قوس قزح</option><option value='12'>شرطي</option>
</select>
<button class='btn-blue' onclick='send("rgb -m "+v("rgb-mode"))'>تعيين</button>
</div></div>
<div class='btns'>
<button onclick='send("clearlist -a")'>مسح AP</button>
<button onclick='send("rf -l")'>عرض RF</button>
<button onclick='send("help")'>مساعدة</button>
</div>
<button class='stop-btn' onclick='send("reboot")'>🔁 إعادة تشغيل</button>
</div>

<div id='log-box'></div>

<script>
var connected=false;
var rfLearning=false;

function v(id){return document.getElementById(id).value}

function log(t){
  var el=document.getElementById('log-box');
  el.innerHTML+=t+'<br>';
  el.scrollTop=el.scrollHeight;
}

function showTab(btn){
  var name=btn.getAttribute('data-tab');
  var tabs=document.getElementsByClassName('tab');
  for(var i=0;i<tabs.length;i++)tabs[i].className='tab';
  btn.className='tab active';
  var contents=document.getElementsByClassName('tab-content');
  for(var i=0;i<contents.length;i++)contents[i].className='tab-content';
  document.getElementById('tab-'+name).className='tab-content active';
}

function doConnect(){
  if(connected){
    AndroidSerial.disconnect();
    return;
  }
  AndroidSerial.connect();
}

function send(cmd){
  if(!connected){log('⚠️ اربط OTG أولاً');return}
  AndroidSerial.send(cmd);
  log('→ '+cmd);
}

function sendIR(){
  var code=document.getElementById('ir-code').value;
  code=code.replace(/^\s+|\s+$/g,'');
  if(!code)return;
  if(code.toUpperCase().indexOf('0X')===0)code=code.substring(2);
  send('HEX:'+code);
}

function toggleRF(){
  if(rfLearning){
    send('rf -z');
    document.getElementById('rf-cap-btn').textContent='بدء تعلم';
    document.getElementById('rf-cap-btn').className='';
    rfLearning=false;
  } else {
    send('rf -c');
    document.getElementById('rf-cap-btn').textContent='🛑 جاري...';
    document.getElementById('rf-cap-btn').className='btn-red';
    rfLearning=true;
    setTimeout(function(){
      send('rf -z');
      send('rf -l');
      document.getElementById('rf-cap-btn').textContent='بدء تعلم';
      document.getElementById('rf-cap-btn').className='';
      rfLearning=false;
    },8000);
  }
}

// ---- Android bridge callbacks ----
var AndroidUSB={
  onStatus:function(s){
    var btn=document.getElementById('otg-btn');
    var badge=document.getElementById('status-badge');
    if(s==='connected'){
      btn.textContent='✅ متصل';
      btn.className='otg-btn connected';
      badge.textContent='متصل';
      badge.style.background='#238636';
      connected=true;
      log('✅ متصل بالـ ESP32');
    } else if(s==='no_device'){
      log('❌ لم يتم العثور على قطعة USB');
    } else if(s==='need_permission'){
      log('🔑 يطلب الإذن...');
    } else if(s==='disconnected'){
      btn.textContent='🔌 اتصال OTG';
      btn.className='otg-btn';
      badge.textContent='غير متصل';
      badge.style.background='#da3633';
      connected=false;
      log('🔌 قطع الاتصال');
    } else if(s.indexOf('error:')===0){
      log('❌ '+s);
    }
  },
  onData:function(d){
    log('← '+d);
  },
  onPermission:function(g){
    if(g){
      log('✅ إذن USB تم');
      AndroidSerial.connect();
    } else {
      log('❌ رفض الإذن');
    }
  }
};
</script>
</body>
</html>
